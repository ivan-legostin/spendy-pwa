<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#1c1c1e"/>
      <stop offset="100%" stop-color="#2c2c2e"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5AC8FA"/>
      <stop offset="100%" stop-color="#2D7FF9"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)"/>

  <!-- Left bar (medium) -->
  <rect x="101" y="200" width="86" height="190" rx="18" ry="18" fill="url(#barGrad)"/>

  <!-- Middle bar (tallest) -->
  <rect x="213" y="122" width="86" height="268" rx="18" ry="18" fill="url(#barGrad)"/>

  <!-- Right bar (shortest) -->
  <rect x="325" y="258" width="86" height="132" rx="18" ry="18" fill="url(#barGrad)"/>

  <!-- Bottom line -->
  <rect x="91" y="408" width="330" height="14" rx="7" ry="7" fill="#2D7FF9" fill-opacity="0.85"/>
</svg>
